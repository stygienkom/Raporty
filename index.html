</html>
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Serwisowy v43</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        :root {
            --bg-body: #f8fafc;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --vehicle-card: #ffffff;
            --issue-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --summary-bg: #0f172a;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-body); 
            padding: 15px; 
            margin: 0; 
            color: var(--text-main); 
            line-height: 1.5;
        }

        .container { max-width: 800px; margin: 0 auto; }

        /* Nagłówek i Statystyki */
        .live-summary { 
            background: var(--summary-bg); 
            color: white; 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }
        .live-summary h3 { 
            margin: 0 0 15px 0; 
            font-size: 0.8rem; 
            letter-spacing: 0.05em;
            text-transform: uppercase; 
            color: #94a3b8; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 8px; 
        }
        #workerStatsContent { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; 
        }
        .live-summary-row { display: flex; justify-content: space-between; font-size: 0.9rem; }
        .live-total { 
            margin-top: 15px; 
            padding-top: 10px; 
            border-top: 1px solid #334155; 
            font-weight: 700; 
            color: var(--success); 
            font-size: 1.1rem;
            text-align: right; 
        }

        /* Karty Pojazdów */
        .vehicle-card { 
            background: var(--vehicle-card); 
            border-radius: 20px; 
            padding: 24px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color); 
        }
        
        .issue-card { 
            background: #ffffff; 
            border-radius: 12px; 
            padding: 18px; 
            margin-bottom: 18px; 
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        /* Inputy i Formularze */
        .issue-grid { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 15px; }
        .category-box { flex-grow: 1; } 
        .time-box { width: 90px; } 

        label { 
            display: block; 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            letter-spacing: 0.025em;
        }

        select, input, textarea { 
            background-color: #f8fafc;
            padding: 10px 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            color: var(--text-main);
            transition: all 0.2s;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Checklista */
        .verification-checklist { 
            margin-top: 15px; 
            padding: 15px; 
            background: #f1f5f9; 
            border-radius: 12px; 
            display: none; 
        }
        .checklist-group { margin-bottom: 15px; }
        .checklist-group-title { 
            font-weight: 800; 
            font-size: 0.7rem; 
            color: var(--primary); 
            margin-bottom: 10px; 
            text-transform: uppercase; 
        }
        
        .check-row { 
            display: flex; 
            flex-direction: column; 
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid var(--border-color);
        }
        .check-header { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; cursor: pointer; }
        .check-header input[type="checkbox"] { width: 18px; height: 18px; margin: 0; }
        
        .fail-comment { margin-top: 8px; display: none; }
        .fail-comment input { border-color: var(--danger); background: #fffafb; }

        /* Tagi pracowników */
        .w-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .worker-tag { 
            background: #e0e7ff; 
            padding: 6px 12px; 
            border-radius: 9999px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.85rem; 
            color: var(--primary); 
            font-weight: 600;
        }
        
        /* Przyciski */
        .btn { 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            border: none; 
            font-size: 0.9rem; 
            padding: 12px 20px; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-add-v { background: var(--primary); color: white; width: 100%; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .btn-add-v:hover { background: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-gen { background: var(--success); color: white; width: 100%; padding: 16px; margin-top: 20px; font-size: 1.1rem; }
        .btn-gen:hover { filter: brightness(1.1); }

        .btn-copy { background: var(--summary-bg); color: white; width: 100%; padding: 16px; margin-top: 15px; }

        .btn-rem { background: #fee2e2; color: var(--danger); font-size: 0.75rem; padding: 6px 12px; }
        .btn-rem:hover { background: var(--danger); color: white; }

        /* Raport Końcowy */
        #reportOutput { 
            background: white; 
            padding: 40px; 
            margin-top: 30px; 
            display: none; 
            border-radius: 16px;
            border: 2px solid #000; 
            color: #000; 
            white-space: pre-wrap; 
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1.6; 
        }
        
        @media print { .no-print { display: none; } #reportOutput { display: block !important; border: none; padding: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <div class="live-summary">
            <h3>📊 PODSUMOWANIE GODZIN</h3>
            <div id="workerStatsContent"></div>
        </div>
        
        <div id="vehicleContainer"></div>
        
        <button class="btn btn-add-v" onclick="addVehicle()">+ Dodaj nowy pojazd</button>
        <button class="btn btn-gen" onclick="generateReport()">📄 Generuj raport końcowy</button>
    </div>

    <div id="reportOutput"></div>

    <div class="no-print" id="actionButtons" style="display:none;">
        <button class="btn btn-copy" onclick="copyToClipboard()">📋 Kopiuj treść raportu</button>
    </div>

    <button class="btn no-print" onclick="resetForm()" style="margin-top:50px; width:100%; opacity:0.5; background:none; color: var(--text-muted); font-size:0.75rem;">WYCZYŚĆ WSZYSTKIE DANE</button>
</div>

<script>
    // Zaktualizowana lista pracowników
    const WORKERS = ["Mirosław Stygienko", "Jacek Grub", "Maciej Myszkowski", "Dominik Czekaj", "Grzegorz Zalewski"];
    const CATEGORIES = ["CHECKLISTA", "AWIA", "NAPRAWA", "REKLAMACJA", "DYSPOZYTOR", "WERYFIKACJA STANU TECHNICZNEGO", "INNE"];
    
    const SCHEMA = {
        "Drzwi wejściowe": ["Napęd", "Bariera optyczna", "Bariera naciskowa", "Przyciski"],
        "Przedział WC": ["Klamka", "Futryna", "Sygnalizacja zajętości", "Toaleta", "Zlew", "Suszarka", "Przewijak", "Czujniki zapełnienia"],
        "SIP": ["Kamery wewnętrzne", "Kamery zewnętrzne", "Tablice wewnętrzne", "Tablice zewnętrzne", "Zapowiadanie stacji"],
        "Pozostałe": ["Klimatyzacja kabinowa", "Klimatyzacja pasażerska", "ETCS", "Próba hamulca", "Przestrzeń kabiny maszynisty", "Przestrzeń pasażerska", "Wentylacja silników", "Ppoż.", "Napęd"]
    };

    const VEHICLES = [];
    for(let i=25; i<=48; i++) VEHICLES.push(`48WEc-${i.toString().padStart(3,'0')}`);
    for(let i=53; i<=60; i++) VEHICLES.push(`48WEc-${i.toString().padStart(3,'0')}`);

    function saveToLocal() {
        const data = [];
        document.querySelectorAll('.vehicle-card').forEach(v => {
            const vData = { number: v.querySelector('.v-number').value, issues: [] };
            v.querySelectorAll('.issue-card').forEach(iss => {
                const iData = {
                    cat: iss.querySelector('.i-category').value,
                    desc: iss.querySelector('.i-desc').value,
                    time: iss.querySelector('.i-time').value,
                    workers: Array.from(iss.querySelectorAll('.w-name')).map(s => s.value),
                    checks: Array.from(iss.querySelectorAll('.check-row')).map(row => ({
                        name: row.querySelector('.check-input').value,
                        ok: row.querySelector('.check-input').checked,
                        comment: row.querySelector('.fail-input').value
                    }))
                };
                vData.issues.push(iData);
            });
            data.push(vData);
        });
        localStorage.setItem('serwisV43_data', JSON.stringify(data));
        updateSummary();
    }

    function loadLocal() {
        const saved = localStorage.getItem('serwisV43_data');
        if(!saved) { addVehicle(); return; }
        JSON.parse(saved).forEach(vData => {
            const vId = createVehicleUI(vData.number);
            vData.issues.forEach(iData => {
                const iId = createIssueUI(vId, iData.cat, iData.desc, iData.time);
                iData.workers.forEach(w => createWorkerUI(iId, w));
                if(iData.checks) {
                    iData.checks.forEach(c => {
                        const row = Array.from(document.querySelectorAll(`#${iId} .check-row`)).find(r => r.querySelector('.check-input').value === c.name);
                        if(row) {
                            row.querySelector('.check-input').checked = c.ok;
                            row.querySelector('.fail-input').value = c.comment;
                            row.querySelector('.fail-comment').style.display = c.ok ? 'none' : 'block';
                        }
                    });
                }
                toggleChecklist(iId, iData.cat, false);
            });
        });
        updateSummary();
    }

    function createVehicleUI(val) {
        const id = `v${Date.now()}${Math.random().toString(36).substr(2, 5)}`;
        document.getElementById('vehicleContainer').insertAdjacentHTML('beforeend', `
            <div class="vehicle-card" id="${id}">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div style="width:60%"><label>Numer Pojazdu</label><select class="v-number" onchange="saveToLocal()">${VEHICLES.map(v=>`<option ${val===v?'selected':''}>${v}</option>`).join('')}</select></div>
                    <button class="btn btn-rem" onclick="if(confirm('Usunąć pojazd?')) { document.getElementById('${id}').remove(); saveToLocal(); }">USUŃ POJAZD</button>
                </div>
                <div id="iss-${id}"></div>
                <button class="btn" style="background:#f1f5f9; color:#475569; width:100%; border:2px dashed #cbd5e1" onclick="addIssue('${id}')">+ Dodaj czynność serwisową</button>
            </div>
        `);
        return id;
    }

    function createIssueUI(vId, cat, desc, time) {
        const id = `i${Date.now()}${Math.random().toString(36).substr(2, 5)}`;
        let chkHtml = `<div class="verification-checklist">`;
        for(const [g, items] of Object.entries(SCHEMA)) {
            chkHtml += `<div class="checklist-group"><div class="checklist-group-title">${g}</div>`;
            items.forEach(it => {
                chkHtml += `
                <div class="check-row">
                    <label class="check-header">
                        <input type="checkbox" class="check-input" value="${it}" checked onchange="handleCheckChange(this)"> ${it}
                    </label>
                    <div class="fail-comment"><input type="text" class="fail-input" placeholder="Opis usterki..." oninput="saveToLocal()"></div>
                </div>`;
            });
            chkHtml += `</div>`;
        }
        chkHtml += `</div>`;

        document.getElementById(`iss-${vId}`).insertAdjacentHTML('beforeend', `
            <div class="issue-card" id="${id}">
                <div class="issue-grid">
                    <div class="category-box"><label>Kategoria</label>
                        <select class="i-category" onchange="toggleChecklist('${id}', this.value, true); saveToLocal();">${CATEGORIES.map(c=>`<option ${cat===c?'selected':''}>${c}</option>`).join('')}</select>
                    </div>
                    <div class="time-box"><label>h</label><input type="number" class="i-time" step="0.5" value="${time||0.5}" oninput="saveToLocal()"></div>
                    <button class="btn btn-rem" style="padding: 10px;" onclick="document.getElementById('${id}').remove(); saveToLocal();">✕</button>
                </div>
                <label>Opis czynności</label>
                <textarea class="i-desc" rows="2" placeholder="Wpisz co zostało wykonane..." oninput="saveToLocal()">${desc||''}</textarea>
                ${chkHtml}
                <div class="w-list"></div>
                <button class="btn" style="background:#fff; border:1px solid var(--primary); color: var(--primary); padding: 5px 12px; font-size: 0.8rem; margin-top:12px;" onclick="createWorkerUI('${id}')">+ Dodaj pracownika</button>
            </div>
        `);
        return id;
    }

    function handleCheckChange(chk) {
        const row = chk.closest('.check-row');
        row.querySelector('.fail-comment').style.display = chk.checked ? 'none' : 'block';
        saveToLocal();
    }

    function toggleChecklist(id, cat, resetChecks) {
        const div = document.querySelector(`#${id} .verification-checklist`);
        const isVer = cat === "WERYFIKACJA STANU TECHNICZNEGO";
        div.style.display = isVer ? 'block' : 'none';
        if(isVer && resetChecks) {
            div.querySelectorAll('.check-input').forEach(c => { 
                c.checked = true; 
                c.closest('.check-row').querySelector('.fail-comment').style.display = 'none';
            });
        }
    }

    function createWorkerUI(iId, name) {
        const id = `w${Date.now()}${Math.random().toString(36).substr(2, 5)}`;
        document.querySelector(`#${iId} .w-list`).insertAdjacentHTML('beforeend', `
            <div class="worker-tag" id="${id}">
                <select class="w-name" style="border:none; background:none; padding:0; font-size:inherit; color:inherit; width:auto; font-weight:700; cursor:pointer;" onchange="saveToLocal()">${WORKERS.map(w=>`<option ${name===w?'selected':''}>${w}</option>`).join('')}</select>
                <span style="cursor:pointer; opacity:0.6;" onclick="document.getElementById('${id}').remove(); saveToLocal();">✕</span>
            </div>
        `);
    }

    function updateSummary() {
        let s = {}; let t = 0;
        document.querySelectorAll('.issue-card').forEach(iss => {
            const h = parseFloat(iss.querySelector('.i-time').value) || 0;
            iss.querySelectorAll('.w-name').forEach(w => { s[w.value] = (s[w.value] || 0) + h; t += h; });
        });
        document.getElementById('workerStatsContent').innerHTML = Object.entries(s).map(([n,h])=>`<div class="live-summary-row"><span>${n}</span> <span>${h} h</span></div>`).join('') + `<div class="live-total">SUMA: ${t} h</div>`;
    }

    function generateReport() {
        const output = document.getElementById('reportOutput');
        let h = "";
        document.querySelectorAll('.vehicle-card').forEach(v => {
            h += `<div style="margin-bottom:10px; font-weight:bold;">Pojazd: ${v.querySelector('.v-number').value}</div>`;
            v.querySelectorAll('.issue-card').forEach(iss => {
                const catValue = iss.querySelector('.i-category').value;
                const desc = iss.querySelector('.i-desc').value;
                const workers = Array.from(iss.querySelectorAll('.w-name')).map(w=>w.value).join(', ');
                const time = iss.querySelector('.i-time').value;
                
                h += `<div><b>${catValue}:</b></div>`;
                if(desc) h += `<div style="padding-left:25px;">${desc}</div>`;
                
                if(catValue === "WERYFIKACJA STANU TECHNICZNEGO") {
                    iss.querySelectorAll('.check-row').forEach(row => {
                        const it = row.querySelector('.check-input').value;
                        const ok = row.querySelector('.check-input').checked;
                        const com = row.querySelector('.fail-input').value;
                        if(ok) {
                            h += `<div style="padding-left:25px;">${it}: sprawne</div>`;
                        } else {
                            h += `<div style="padding-left:25px;">${it}:</div>`;
                            h += `<div style="padding-left:40px;">USTERKA - ${com || 'nie określono'}</div>`;
                        }
                    });
                }
                h += `<div style="padding-left:25px; margin-bottom:15px; color:#444;">${workers} ${time}h</div>`;
            });
            h += `<div style="margin-bottom:30px;"></div>`;
        });
        output.innerHTML = h;
        output.style.display = 'block';
        document.getElementById('actionButtons').style.display = 'block';
        output.scrollIntoView({behavior:"smooth"});
    }

    function copyToClipboard() {
        const text = document.getElementById('reportOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Raport skopiowany do schowka!");
        });
    }

    function addVehicle() { const id = createVehicleUI(); addIssue(id); saveToLocal(); }
    function addIssue(vId) { const id = createIssueUI(vId); createWorkerUI(id); saveToLocal(); }
    function resetForm() { if(confirm("Czy na pewno wyczyścić wszystkie dane?")) { localStorage.removeItem('serwisV43_data'); location.reload(); } }

    window.onload = loadLocal;
</script>
</body>
</html>
